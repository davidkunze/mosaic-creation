name: geo_env
channels:
  - conda-forge
  - defaults
dependencies:
  - python=3.13
  - geopandas
  - shapely
  - fiona
  - rasterio
  - gdal
  - pandas
  - numpy
  # optional: useful geospatial libraries
  - pyproj
  - rtree
  - matplotlib
  - scikit-learn
  - jupyter
  - ipykernel
  - pip
  - pip:
      # Add any additional pip-only packages here
      # Example:
      # - some_package_not_on_conda
      - shapely[vectorized]
